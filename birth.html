<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>민준 Birthday Party</title>
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; scroll-snap-type: y mandatory; }

    body {
      background: #08080f;
      color: #f0f0f0;
      font-family: 'Noto Sans KR', sans-serif;
      overflow-x: hidden;
    }

    /* ────────── 공통 섹션 ────────── */
    section {
      width: 100vw;
      min-height: 100vh;
      scroll-snap-align: start;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      position: relative;
      overflow: hidden;
      padding: 60px 40px;
    }

    /* ────────── 색종이 캔버스 ────────── */
    #canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 999;
    }

    /* ══════════════════════════════════
       SECTION 1 — HERO
    ══════════════════════════════════ */
    #s1 {
      background: #08080f;
      text-align: center;
    }

    /* 배경 그라디언트 오브 */
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(110px);
      pointer-events: none;
    }
    #s1 .orb1 { width: 70vw; height: 70vw; max-width: 700px; max-height: 700px;
      background: #4c1a6e; top: -20%; left: -20%; opacity: .6;
      animation: drift1 12s ease-in-out infinite alternate; }
    #s1 .orb2 { width: 50vw; height: 50vw; max-width: 500px; max-height: 500px;
      background: #0f3a5c; bottom: -15%; right: -10%; opacity: .5;
      animation: drift2 10s ease-in-out infinite alternate; }
    @keyframes drift1 { from{transform:translate(0,0)} to{transform:translate(5vw,4vh)} }
    @keyframes drift2 { from{transform:translate(0,0)} to{transform:translate(-4vw,5vh)} }

    /* 상단 태그 */
    .hero-tag {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid rgba(255,255,255,.15);
      border-radius: 50px;
      padding: 8px 20px;
      font-size: .72rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: rgba(255,255,255,.5);
      margin-bottom: 36px;
      z-index: 1;
      animation: fadeUp .7s .1s both;
    }
    .hero-tag span {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #d4ff6b;
      animation: blink 1.8s infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

    /* 메인 타이틀 */
    .hero-title {
      font-family: 'Unbounded', sans-serif;
      font-weight: 900;
      font-size: clamp(3.5rem, 12vw, 10rem);
      line-height: .95;
      z-index: 1;
      animation: fadeUp .7s .25s both;
    }
    .hero-title .line1 { display: block; color: #fff; }
    .hero-title .line2 {
      display: block;
      background: linear-gradient(90deg, #d4ff6b, #ff6bda);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-sub {
      font-size: clamp(.9rem, 2vw, 1.1rem);
      color: rgba(255,255,255,.4);
      margin-top: 28px;
      letter-spacing: 2px;
      z-index: 1;
      animation: fadeUp .7s .4s both;
    }

    /* 스크롤 힌트 */
    .scroll-hint {
      position: absolute;
      bottom: 36px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      font-size: .68rem;
      letter-spacing: 2px;
      color: rgba(255,255,255,.3);
      animation: fadeUp .7s .8s both;
      z-index: 1;
    }
    .scroll-arrow {
      width: 24px; height: 24px;
      border-right: 2px solid rgba(255,255,255,.25);
      border-bottom: 2px solid rgba(255,255,255,.25);
      transform: rotate(45deg);
      animation: arrowBounce 1.6s ease-in-out infinite;
    }
    @keyframes arrowBounce { 0%,100%{transform:rotate(45deg) translateY(0)} 50%{transform:rotate(45deg) translateY(6px)} }

    /* ══════════════════════════════════
       SECTION 2 — 정보
    ══════════════════════════════════ */
    #s2 {
      background: #0d0d18;
    }
    #s2 .orb3 { width: 60vw; height: 60vw; max-width: 600px; max-height: 600px;
      background: #0f4a3a; top: 10%; right: -10%; opacity: .4;
      animation: drift1 14s ease-in-out infinite alternate; }

    .info-label-top {
      font-size: .7rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #d4ff6b;
      margin-bottom: 48px;
      z-index: 1;
      animation: revealObs .6s both;
    }

    .info-blocks {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 2px;
      width: 100%;
      max-width: 960px;
      z-index: 1;
    }

    .info-block {
      padding: 52px 40px;
      background: rgba(255,255,255,.03);
      border: 1px solid rgba(255,255,255,.06);
      display: flex;
      flex-direction: column;
      gap: 14px;
      transition: background .3s;
      animation: revealObs .6s both;
    }
    .info-block:hover { background: rgba(255,255,255,.055); }
    .info-block:nth-child(2) { animation-delay: .12s; }
    .info-block:nth-child(3) { animation-delay: .24s; }

    .info-block-icon { font-size: 2rem; }
    .info-block-key {
      font-size: .65rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: rgba(255,255,255,.3);
    }
    .info-block-val {
      font-family: 'Unbounded', sans-serif;
      font-size: clamp(1rem, 2.5vw, 1.4rem);
      font-weight: 700;
      line-height: 1.3;
    }

    /* ══════════════════════════════════
       SECTION 3 — 메시지
    ══════════════════════════════════ */
    #s3 {
      background: #08080f;
      text-align: center;
      gap: 0;
    }
    #s3 .orb4 { width: 80vw; height: 80vw; max-width: 800px; max-height: 800px;
      background: #3a0f4a; top: 50%; left: 50%; transform: translate(-50%,-50%);
      opacity: .35; animation: drift2 15s ease-in-out infinite alternate; }

    .msg-num {
      font-family: 'Unbounded', sans-serif;
      font-size: clamp(18vw, 25vw, 280px);
      font-weight: 900;
      line-height: 1;
      color: rgba(255,255,255,.03);
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%,-50%);
      white-space: nowrap;
      user-select: none;
    }

    .msg-text {
      font-size: clamp(1rem, 2.5vw, 1.35rem);
      color: rgba(255,255,255,.65);
      line-height: 2;
      max-width: 640px;
      z-index: 1;
      animation: revealObs .7s both;
    }
    .msg-text strong { color: #d4ff6b; font-weight: 700; }

    /* ══════════════════════════════════
       SECTION 4 — RSVP
    ══════════════════════════════════ */
    #s4 {
      background: #0d0d18;
    }
    #s4 .orb5 { width: 60vw; height: 60vw; max-width: 600px; max-height: 600px;
      background: #5c0f3a; bottom: -10%; left: -10%; opacity: .4;
      animation: drift1 13s ease-in-out infinite alternate; }

    .rsvp-q {
      font-family: 'Unbounded', sans-serif;
      font-size: clamp(2rem, 7vw, 5.5rem);
      font-weight: 900;
      text-align: center;
      line-height: 1.15;
      z-index: 1;
      animation: revealObs .7s both;
      margin-bottom: 56px;
    }
    .rsvp-q em {
      font-style: normal;
      background: linear-gradient(90deg, #d4ff6b, #ff6bda);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .rsvp-btns {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
      z-index: 1;
      animation: revealObs .7s .15s both;
    }

    .btn {
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      padding: 20px 56px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      letter-spacing: .5px;
      transition: transform .2s cubic-bezier(.16,1,.3,1), box-shadow .2s;
    }
    .btn:hover  { transform: translateY(-4px) scale(1.03); }
    .btn:active { transform: scale(.97); }

    .btn-yes {
      background: #d4ff6b;
      color: #08080f;
      box-shadow: 0 0 40px rgba(212,255,107,.25);
      animation: glowY 2.5s ease-in-out infinite;
    }
    @keyframes glowY {
      0%,100% { box-shadow: 0 0 30px rgba(212,255,107,.2); }
      50%      { box-shadow: 0 0 60px rgba(212,255,107,.45); }
    }
    .btn-yes:hover { animation: none; box-shadow: 0 12px 40px rgba(212,255,107,.4); }

    .btn-no {
      background: transparent;
      color: rgba(255,255,255,.35);
      border: 1px solid rgba(255,255,255,.12);
    }
    .btn-no:hover { border-color: rgba(255,255,255,.3); color: rgba(255,255,255,.7); }

    /* ────────── 공통 애니메이션 ────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes revealObs {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ────────── 모달 ────────── */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.75);
      backdrop-filter: blur(16px);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .overlay.show { display: flex; }
    .modal {
      background: #13131e;
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 20px;
      padding: 52px 44px;
      max-width: 400px;
      width: 90%;
      text-align: center;
      animation: modalIn .5s cubic-bezier(.16,1,.3,1) both;
      box-shadow: 0 40px 100px rgba(0,0,0,.6);
    }
    @keyframes modalIn {
      from { opacity:0; transform:scale(.85) translateY(40px); }
      to   { opacity:1; transform:scale(1) translateY(0); }
    }
    .modal-emoji { font-size: 3.8rem; display: block; margin-bottom: 20px; }
    .modal-title {
      font-family: 'Unbounded', sans-serif;
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 14px;
    }
    .modal-msg {
      font-size: .92rem;
      color: rgba(255,255,255,.5);
      line-height: 1.8;
      margin-bottom: 36px;
      white-space: pre-line;
    }
    .modal-close {
      width: 100%;
      padding: 16px;
      border-radius: 8px;
      background: #d4ff6b;
      color: #08080f;
      font-weight: 700;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: .95rem;
      border: none;
      cursor: pointer;
      transition: transform .2s, box-shadow .2s;
    }
    .modal-close:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(212,255,107,.35); }

    /* ────────── 진행 도트 ────────── */
    .progress {
      position: fixed;
      right: 28px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 10px;
      z-index: 50;
    }
    .pdot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: rgba(255,255,255,.2);
      transition: background .3s, transform .3s;
      cursor: pointer;
    }
    .pdot.active {
      background: #d4ff6b;
      transform: scale(1.5);
    }

    @media(max-width:600px) {
      section { padding: 48px 24px; }
      .info-block { padding: 36px 24px; }
      .rsvp-btns { flex-direction: column; align-items: stretch; }
      .btn { padding: 18px 40px; text-align: center; }
      .progress { display: none; }
    }
  </style>
</head>
<body>

<canvas id="canvas"></canvas>

<!-- 진행 도트 -->
<nav class="progress" id="progress">
  <div class="pdot active" onclick="goTo(0)"></div>
  <div class="pdot" onclick="goTo(1)"></div>
  <div class="pdot" onclick="goTo(2)"></div>
  <div class="pdot" onclick="goTo(3)"></div>
</nav>

<!-- ══ S1 HERO ══ -->
<section id="s1">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>

  <div class="hero-tag"><span></span>Birthday Party Invitation</div>
  <h1 class="hero-title">
    <span class="line1">민준의</span>
    <span class="line2">BIRTHDAY</span>
  </h1>
  <p class="hero-sub">APR 20, 2025 &nbsp;·&nbsp; 메가또리아</p>

  <div class="scroll-hint">
    <span>SCROLL</span>
    <div class="scroll-arrow"></div>
  </div>
</section>

<!-- ══ S2 INFO ══ -->
<section id="s2">
  <div class="orb orb3"></div>

  <p class="info-label-top">Party Details</p>
  <div class="info-blocks">
    <div class="info-block">
      <span class="info-block-icon">📅</span>
      <span class="info-block-key">Date</span>
      <span class="info-block-val">2025년<br/>4월 20일 (일)</span>
    </div>
    <div class="info-block">
      <span class="info-block-icon">📍</span>
      <span class="info-block-key">Venue</span>
      <span class="info-block-val">메가또리아</span>
    </div>
    <div class="info-block">
      <span class="info-block-icon">🎁</span>
      <span class="info-block-key">Note</span>
      <span class="info-block-val">너만 와줘도 충분해</span>
    </div>
  </div>
</section>

<!-- ══ S3 MESSAGE ══ -->
<section id="s3">
  <div class="orb orb4"></div>
  <div class="msg-num">🎂</div>
  <p class="msg-text">
    야 친구들, 나 <strong>민준</strong> 올해도 생일이 왔어!<br/>
    메가또리아에서 같이 시간 보내자.<br/>
    맛있는 거 먹고, 게임하고, 케이크 불기까지 —<br/>
    꼭 와줘. 진짜로. 🖤
  </p>
</section>

<!-- ══ S4 RSVP ══ -->
<section id="s4">
  <div class="orb orb5"></div>
  <h2 class="rsvp-q">올 수<br/><em>있어?</em></h2>
  <div class="rsvp-btns">
    <button class="btn btn-yes" onclick="handleYes()">✅ &nbsp;갈게!</button>
    <button class="btn btn-no"  onclick="handleNo()">😢 &nbsp;못 갈 것 같아</button>
  </div>
</section>

<!-- 모달 -->
<div class="overlay" id="overlay" onclick="closeOverlay(event)">
  <div class="modal">
    <span class="modal-emoji" id="mEmoji"></span>
    <h2 class="modal-title" id="mTitle"></h2>
    <p class="modal-msg" id="mMsg"></p>
    <button class="modal-close" onclick="closeOverlayBtn()">닫기</button>
  </div>
</div>

<script>
/* ── 색종이 ── */
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const resize = () => { canvas.width = innerWidth; canvas.height = innerHeight; };
resize();
window.addEventListener('resize', resize);
let pieces = [];
const pal = ['#d4ff6b','#ff6bda','#6bbaff','#ffffff','#ffda6b','#ff9f6b'];
function burst(n=120){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2, s=5+Math.random()*10;
    pieces.push({
      x:Math.random()*innerWidth, y:Math.random()*innerHeight*.5,
      vx:Math.cos(a)*s, vy:Math.sin(a)*s-5,
      w:7+Math.random()*9, h:4+Math.random()*5,
      r:Math.random()*360, rv:(Math.random()-.5)*14,
      c:pal[Math.floor(Math.random()*pal.length)], life:1
    });
  }
}
(function tick(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  pieces=pieces.filter(p=>p.life>.015);
  for(const p of pieces){
    p.x+=p.vx; p.y+=p.vy; p.vy+=.2; p.vx*=.99; p.r+=p.rv; p.life-=.011;
    ctx.save(); ctx.globalAlpha=p.life;
    ctx.translate(p.x,p.y); ctx.rotate(p.r*Math.PI/180);
    ctx.fillStyle=p.c; ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
    ctx.restore();
  }
  requestAnimationFrame(tick);
})();
setTimeout(()=>burst(140),600);

/* ── 진행 도트 ── */
const sections = [...document.querySelectorAll('section')];
const dots     = [...document.querySelectorAll('.pdot')];
const goTo = i => sections[i].scrollIntoView({behavior:'smooth'});
const obs = new IntersectionObserver(entries=>{
  entries.forEach(e=>{
    if(e.isIntersecting){
      const i = sections.indexOf(e.target);
      dots.forEach((d,j)=>d.classList.toggle('active',j===i));
    }
  });
},{threshold:.5});
sections.forEach(s=>obs.observe(s));

/* ── 버튼 ── */
function handleYes(){
  document.getElementById('mEmoji').textContent='🎉';
  document.getElementById('mTitle').textContent='완전 기대돼!';
  document.getElementById('mMsg').textContent='고마워, 진짜로.\n메가또리아에서 보자! 🖤';
  document.getElementById('overlay').classList.add('show');
  burst(200);
}
function handleNo(){
  document.getElementById('mEmoji').textContent='🥲';
  document.getElementById('mTitle').textContent='아쉽다...';
  document.getElementById('mMsg').textContent='그래도 마음은 받을게.\n다음엔 꼭 함께해 줘.';
  document.getElementById('overlay').classList.add('show');
}
function closeOverlay(e){ if(e.target===document.getElementById('overlay')) document.getElementById('overlay').classList.remove('show'); }
function closeOverlayBtn(){ document.getElementById('overlay').classList.remove('show'); }
</script>

<script src="https://static-s3.skyworkcdn.com/fe/skywork-site-assets/scripts/embed_website.min.js"></script>
<script async src="https://static-us-img.skywork.ai/prod/website_script/websiteBadge.js?v=3"></script>
<script async src="https://static-us-img.skywork.ai/prod/website_script/websiteTrack.js?v=3"></script>
</body>
</html>
